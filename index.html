<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinical Calculators | โปรแกรมคำนวณทางการแพทย์</title>
    <meta name="description" content="Medical calculators for Creatinine Clearance and Warfarin Dosing.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Prompt:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #0ea5e9;
            --primary-dark: #0284c7;
            --primary-light: #e0f2fe;
            --secondary: #f43f5e;
            --secondary-light: #ffe4e6;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --bg-color: #f8fafc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Prompt', 'Inter', sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-color);
            background-image:
                radial-gradient(at 0% 0%, hsla(202, 100%, 88%, 1) 0px, transparent 50%),
                radial-gradient(at 100% 0%, hsla(280, 100%, 92%, 1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, hsla(168, 100%, 90%, 1) 0px, transparent 50%),
                radial-gradient(at 0% 100%, hsla(347, 100%, 93%, 1) 0px, transparent 50%);
            background-attachment: fixed;
            overflow-x: hidden;
            position: relative;
            padding: 2rem;
        }

        .container {
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 32px;
            padding: 4rem 3rem;
            box-shadow:
                0 4px 6px -1px rgba(0, 0, 0, 0.05),
                0 24px 48px -12px rgba(0, 0, 0, 0.1);
            text-align: center;
            animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            margin-bottom: 4rem;
        }

        .header-icon {
            width: 64px;
            height: 64px;
            color: var(--primary);
            margin: 0 auto 1.5rem;
            background: white;
            padding: 12px;
            border-radius: 20px;
            box-shadow: 0 10px 25px -5px rgba(14, 165, 233, 0.2);
        }

        .header h1 {
            font-size: 2.75rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--text-main);
            letter-spacing: -0.025em;
            line-height: 1.2;
        }

        .header p {
            font-size: 1.125rem;
            color: var(--text-muted);
            font-weight: 400;
            max-width: 500px;
            margin: 0 auto;
        }

        .cards-wrapper {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2.5rem;
            margin-bottom: 4rem;
        }

        .card {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 3rem 2rem;
            background: white;
            border-radius: 24px;
            text-decoration: none;
            color: var(--text-main);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02);
            border: 1px solid rgba(226, 232, 240, 0.8);
            position: relative;
            z-index: 1;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 24px;
            background: linear-gradient(135deg, var(--primary-light), transparent);
            opacity: 0;
            z-index: -1;
            transition: opacity 0.4s ease;
        }

        .card.warfarin::before {
            background: linear-gradient(135deg, var(--secondary-light), transparent);
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.08);
            border-color: transparent;
        }

        .card:hover::before {
            opacity: 1;
        }

        .icon-wrapper {
            width: 80px;
            height: 80px;
            border-radius: 24px;
            background: var(--primary-light);
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 1.5rem;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .card.warfarin .icon-wrapper {
            background: var(--secondary-light);
        }

        .card:hover .icon-wrapper {
            transform: scale(1.1) rotate(5deg);
        }

        .card-icon {
            width: 40px;
            height: 40px;
            color: var(--primary);
        }

        .card.warfarin .card-icon {
            color: var(--secondary);
        }

        .card-title {
            font-size: 1.35rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            color: var(--text-main);
        }

        .card-desc {
            font-size: 0.95rem;
            color: var(--text-muted);
            text-align: center;
            line-height: 1.6;
        }

        .footer {
            display: flex;
            justify-content: center;
        }

        .creator-badge {
            display: inline-flex;
            align-items: center;
            padding: 0.875rem 1.5rem;
            background: white;
            border-radius: 100px;
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-muted);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(226, 232, 240, 0.8);
            transition: all 0.3s ease;
        }

        .creator-badge:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            color: var(--text-main);
        }

        .creator-icon {
            width: 20px;
            height: 20px;
            margin-right: 0.75rem;
            color: #10b981;
        }

        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }

            .container {
                padding: 3rem 1.5rem;
                border-radius: 24px;
            }

            .header h1 {
                font-size: 2rem;
            }

            .cards-wrapper {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header class="header">
            <svg class="header-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10">
                </path>
            </svg>
            <h1>Clinical Calculators</h1>
            <p>โปรแกรมคำนวณทางการแพทย์สำหรับบุคลากรทางการแพทย์</p>
        </header>

        <main class="cards-wrapper">
            <!-- Creatinine Clearance Link -->
            <a href="CrCl-Cal.html" class="card">
                <div class="icon-wrapper">
                    <svg class="card-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z">
                        </path>
                    </svg>
                </div>
                <h2 class="card-title">Creatinine Clearance</h2>
                <p class="card-desc">โปรแกรมคำนวณการทำงานของไต (CrCl) ด้วยสมการ Cockcroft-Gault</p>
            </a>

            <!-- Warfarin Dose Link -->
            <a href="Warfatin-Cal-Dose.html" class="card warfarin">
                <div class="icon-wrapper">
                    <svg class="card-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z">
                        </path>
                    </svg>
                </div>
                <h2 class="card-title">Warfarin Dose</h2>
                <p class="card-desc">โปรแกรมคำนวณและประเมินการปรับขนาดยาต้านการแข็งตัวของเลือด (Warfarin)</p>
            </a>
        </main>

        <footer class="footer">
            <div class="creator-badge">
                <svg class="creator-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                    xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                </svg>
                จัดทำโดย ภก. นราวิชญ์ เสียงตรง
            </div>
        </footer>
    </div>
</body>

</html>
